services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux
      POSTGRES_DB: flux
    ports:
      - "5432:5432"
    volumes:
      - flux_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://flux:flux@db:5432/flux?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-please-change-32chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      PUBLIC_APP_SCHEME: ${PUBLIC_APP_SCHEME:-flux}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-flux://,http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  flux_db:
